name: Broken Links

on:
  push:
    branches: [main]
  schedule:
    - cron: "0 9 * * 1"

jobs:
  links:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Scan for broken links
        uses: lycheeverse/lychee-action@v2
        with:
          args: --verbose --no-progress --exclude 'deploy.workers.cloudflare.com' '**/*.md' '**/*.html' '**/*.astro'
          fail: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
